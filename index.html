<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도서관 수호자: 흔적의 미로</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
  <!-- p5.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
  <!--
    ★ 파일 로드 순서 중요 — 의존 관계:
      01_data      : 상수·데이터 (다른 모든 파일의 기반)
      02_bgm       : BGM (_midi, _note 등 내부 함수 포함)
      03_sfx       : 효과음 (bgm 함수 참조)
      04_background: 배경 드로잉
      05_characters: 캐릭터 드로잉
      06_scenes    : 씬 드로잉 (배경·캐릭터 참조)
      07_gameplay  : 게임플레이 HUD·보스 퀴즈 (씬·이펙트 참조)
      08_entities  : Caterpillar, Predator 클래스 (이펙트·BGM 참조)
      09_effects   : 파티클·식물·반딧불·흡입 이펙트
      10_state     : 전역 상태 변수 + loadStage (모든 클래스 참조)
      11_input     : 입력 처리 (모든 게임 로직 참조)
      12_main      : setup(), draw() — 최후 로드
  -->
  <script src="01_data.js"></script>
  <script src="02_bgm.js"></script>
  <script src="03_sfx.js"></script>
  <script src="04_background.js"></script>
  <script src="05_characters.js"></script>
  <script src="06_scenes.js"></script>
  <script src="07_gameplay.js"></script>
  <script src="08_entities.js"></script>
  <script src="09_effects.js"></script>
  <script src="10_state.js"></script>
  <script src="11_input.js"></script>
  <script src="12_main.js"></script>
  <script src="13_credits.js"></script>
</body>
</html>
